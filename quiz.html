<title>題庫快搜 Ultimate</title>
<style>

input{width:80%;padding:12px;font-size:20px;}
.card{background:#222;margin:10px;padding:10px;border-radius:8px;text-align:left;}
.answer{color:#ff4d4d;font-weight:bold;}
.timer{font-size:24px;margin:10px;}
button{padding:8px 12px;margin:5px;}
</style>

<input id="search" placeholder="輸入關鍵字..." oninput="search()">

<div class="timer" id="timer"></div>

// ======== 模糊搜尋算法 ========
function score(a,b){
    let s=0;
    for(let i=0;i<a.length;i++){
        if(b.includes(a[i])) s++;
    }
    return s;
}

// ======== 搜尋 ========
function search(){
    const input=document.getElementById("search").value;
    const result=document.getElementById("result");
    result.innerHTML="";
    if(!input) return;

    const res=data.map(x=>({
        ...x,
        s:score(input,x.q)
    }))
    .filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s)
    .slice(0,10);

    res.forEach(x=>{
        let div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<div>Q: ${x.q}</div>
        <div class="answer">A: ${x.a}</div>`;
        result.appendChild(div);
    });
}

// ======== 計時器 ========
let t;
function startTimer(){
    let s=15;
    document.getElementById("timer").innerText=s;
    clearInterval(t);
    t=setInterval(()=>{
        s--;
        document.getElementById("timer").innerText=s;
        if(s<=0) clearInterval(t);
    },1000);
}
function stopTimer(){
    clearInterval(t);
    document.getElementById("timer").innerText="";
}
</script>

</body>
</html>
